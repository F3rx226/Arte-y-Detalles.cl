<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brillo de Mujer | Arte & Detalles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8f4ff; 
            padding-top: 100px; 
            color: #3c096c;
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            overflow-x: hidden;
        }

        /* --- NAVBAR (IDÉNTICA A ESPECIAL-2.HTML) --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; z-index: 2000;
            background: linear-gradient(120deg, #9b5de5, #5a189a);
            border-bottom: 3px solid #e0aaff;
            box-shadow: 0 4px 15px rgba(90, 24, 154, 0.2);
        }
        .nav-container { width: 95%; max-width: 1200px; height: 100%; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .nav-side { display: flex; gap: 15px; flex: 1; }
        .nav-left { justify-content: flex-end; padding-right: 50px; }
        .nav-right { justify-content: flex-start; padding-left: 50px; }
        .nav-side a { 
            text-decoration: none; color: #ffffff; font-weight: 700; 
            text-transform: uppercase; font-size: 0.75rem; transition: 0.3s; 
        }

        .nav-logo {
            position: absolute; left: 50%; top: 50%; 
            transform: translate(-50%, -30%); 
            background: #ffffff; width: 95px; height: 95px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; z-index: 2100;
            border: 4px solid #9b5de5; box-shadow: 0 8px 25px rgba(90, 24, 154, 0.3); 
            overflow: hidden;
        }
        .nav-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* --- RESPONSIVE CORREGIDO --- */
        @media (max-width: 768px) { 
            .nav-side { display: flex !important; gap: 10px; } /* Forzamos que se vea */
            .nav-left { padding-right: 40px; }
            .nav-right { padding-left: 40px; }
            .nav-side a { font-size: 0.7rem; } /* Letra grande como pediste */
            .nav-logo { width: 85px; height: 85px; }
            body { padding-top: 90px; }
        }

        /* --- CONTENIDO --- */
        .container { 
            max-width: 1100px; margin: 20px auto; padding: 30px 20px; 
            display: flex; flex-wrap: wrap; gap: 30px; 
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid #e0aaff;
        }
        
        .producto-img { flex: 1; min-width: 300px; text-align: center; }
        #imagenPrincipal { width: 100%; border-radius: 20px; border: 6px solid white; height: 450px; object-fit: cover; }
        
        .miniaturas { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .miniaturas img { width: 75px; height: 75px; border-radius: 12px; cursor: pointer; object-fit: cover; border: 3px solid white; }

        .producto-info { flex: 1; min-width: 300px; padding: 10px; }
        .producto-info h2 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #5a189a; }
        .producto-info h3 { font-size: 2.2rem; color: #240046; margin: 20px 0; font-weight: 700; }

        .btn-compra {
            display: inline-block; padding: 18px 30px; border-radius: 50px;
            color: white; text-decoration: none; font-weight: 700; text-transform: uppercase;
            text-align: center; width: 100%; background: linear-gradient(120deg, #9b5de5, #5a189a);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">

            <div class="nav-side nav-right">

                <a href="https://wa.me/56927439347">WhatsApp</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="producto-img">
            <img id="imagenPrincipal" src="img/valentin.jpg" alt="Brillo de Mujer">
            <div class="miniaturas">
                <img src="img/valentin.jpg" onclick="document.getElementById('imagenPrincipal').src=this.src">
                <img src="img/BoxRosas1.jpg" onclick="document.getElementById('imagenPrincipal').src=this.src">
                <img src="img/Especial2.jpg" onclick="document.getElementById('imagenPrincipal').src=this.src">
            </div>
        </div>

        <div class="producto-info">
            <h2>Brillo de Mujer</h2>
            <p>Un tributo eterno a su fuerza y elegancia. Rosas artesanales diseñadas para durar siempre.💜</p>
            <ul>
                <li>🌸 Rosas Eternas premium</li>
                <li>✨ Caja edición especial</li>
                <li>💌 Tarjeta personalizada</li>
            </ul>
            <h3>$15.990</h3>
            <a href="https://wa.me/56927439347?text=Hola!%20Me%20interesa%20Brillo%20de%20Mujer" class="btn-compra">
                ¡Lo quiero para ella! 💜
            </a>
        </div>
    </div>

</body>
</html>
