<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Colección Bouquet Amarillo | Arte & Detalles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">

    <style>
        /* --- ESTÉTICA PREMIUM MINIMALISTA --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #faf9f6; /* Blanco roto / Hueso */
            color: #333;
            padding-top: 100px;
            overflow-x: hidden;
        }

        /* --- NAVBAR ELEGANTE --- */
        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center;
            z-index: 2000;
            border-bottom: 1px solid #eee;
        }

        .nav-container {
            width: 90%; max-width: 1200px; height: 100%;
            display: flex; align-items: center; justify-content: space-between; position: relative;
        }

        .nav-side { display: flex; gap: 30px; flex: 1; }
        .nav-left { justify-content: flex-end; padding-right: 60px; }
        .nav-right { justify-content: flex-start; padding-left: 60px; }

        .nav-side a { 
            text-decoration: none; color: #555; font-weight: 400; 
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }

        .nav-side a:hover { color: #d4af37; } /* Dorado mate al pasar el mouse */

        .nav-logo {
            position: absolute; left: 50%; top: 50%; 
            transform: translate(-50%, -40%);
            width: 90px; height: 90px; border-radius: 50%;
            background: white; border: 1px solid #eee; padding: 5px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* --- MENÚ HAMBURGUESA (Líneas grises) --- */
        .menu-toggle span { background: #888 !important; }

        /* --- ENCABEZADO TIPO REVISTA --- */
        header { text-align: center; padding: 60px 20px; }
        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.2rem, 6vw, 3.5rem); 
            color: #1a1a1a; 
            font-weight: 400;
            font-style: italic;
            margin-bottom: 10px;
        }
        header p { 
            color: #888; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 0.75rem;
            margin-bottom: 30px;
        }

        .btn-volver {
            display: inline-block; padding: 12px 30px;
            border: 1px solid #333;
            color: #333; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-volver:hover { background: #333; color: white; }

        /* --- GRID DE PRODUCTOS --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }

        .card { background: none; border-radius: 0; overflow: hidden; transition: 0.4s; }

        .card img { 
            width: 100%; height: 400px; object-fit: cover; 
            transition: 0.6s;
            filter: sepia(20%); /* Un toque vintage suave */
        }
        
        .card:hover img { transform: scale(1.03); filter: sepia(0%); }

        .card-body { padding: 25px 0; text-align: center; }
        .card-body h3 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.3rem; color: #1a1a1a;
            margin-bottom: 10px;
        }
        .card-body p { font-size: 0.85rem; color: #666; margin-bottom: 20px; font-weight: 300; }

        .btn { 
            display: inline-block; 
            padding: 10px 0;
            color: #d4af37; /* Dorado */
            text-decoration: none; 
            font-weight: 600; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .btn:hover { border-bottom: 1px solid #d4af37; }

        /* --- BOTÓN FLOTANTE (Elegante) --- */
        .cupido-link {
            position: fixed; bottom: 30px; right: 30px; z-index: 2800;
            text-decoration: none; transition: 0.3s;
        }
        .cupido-link img { 
            width: 80px; border-radius: 50%; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        /* --- AJUSTES MÓVILES --- */
        @media (max-width: 768px) {
            .nav-side { display: none; }
            .nav-logo { width: 70px; height: 70px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="navbar-universal"></div>

    <header>
        <p>Edición Limitada</p>
        <h1>Bouquet Amarillo Eterno</h1>
        <a href="catalogo.html" class="btn-volver">Regresar al catálogo</a>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <a href="especial-1.html"><img src="img/amarillo1.jpg" alt="Ramo Amarillo"></a>
                <div class="card-body">
                    <h3>Ramo Luz de Sol</h3>
                    <p>Un detalle que captura la esencia del sol eterno.</p>
                    <a href="especial-1.html" class="btn">Explorar pieza</a>
                </div>
            </div>
            <div class="card">
                <a href="especial-2.html"><img src="img/boxAmarillo.jpg" alt="Box Floral"></a>
                <div class="card-body">
                    <h3>Box Golden Premium</h3>
                    <p>Elegancia en tonos dorados para momentos inolvidables.</p>
                    <a href="especial-2.html" class="btn">Explorar pieza</a>
                </div>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px; font-size: 0.7rem; color: #999; letter-spacing: 2px; text-transform: uppercase;">
        Arte & Detalles ©️ 2026 · Colección Perpetua
    </footer>

    <a href="https://wa.me/tu-numero" class="cupido-link">
        <img src="img/FloresAmarillasTag.jpg" alt="Contacto">
    </a>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const menuContainer = document.getElementById('navbar-universal');
            if (menuContainer) {
                menuContainer.innerHTML = `
                <nav class="navbar">
                    <div class="nav-container">
                        <div class="menu-toggle" id="btn-abrir-fechas" style="cursor:pointer; display:flex; flex-direction:column; gap:5px; z-index:3000;">
                            <span style="width:25px; height:2px; background:#333; border-radius:2px;"></span>
                            <span style="width:20px; height:2px; background:#333; border-radius:2px;"></span>
                            <span style="width:25px; height:2px; background:#333; border-radius:2px;"></span>
                        </div>
                        <div class="nav-side nav-left"><a href="index.html">Inicio</a><a href="catalogo.html">Catálogo</a></div>
                        <div class="nav-logo"><a href="index.html"><img src="img/regalo.jpeg"></a></div>
                        <div class="nav-side nav-right"><a href="contacto.html">Contacto</a><a href="nosotros.html">Nosotros</a></div>
                    </div>
                </nav>
                <div id="side-menu-fechas" class="side-menu" style="position:fixed; top:0; left:-350px; width:300px; height:100%; background:white; z-index:5000; transition:0.5s cubic-bezier(0.77,0.2,0.05,1.0); box-shadow:20px 0 50px rgba(0,0,0,0.05);">
                    <div class="side-menu-header" style="padding:40px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="font-family:'Playfair Display'; font-weight:400;">Especiales</h3>
                        <button id="btn-cerrar-fechas" style="background:none; border:none; color:#333; font-size:30px; cursor:pointer; font-weight:200;">&times;</button>
                    </div>
                    <div class="side-menu-content" style="padding:40px 20px; display:flex; flex-direction:column; gap:25px;">
                        <a href="especial-mujer.html" style="text-decoration:none; color:#333; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase;">Día de la Mujer</a>
                        <a href="especial-flores-amarillas.html" style="text-decoration:none; color:#d4af37; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; font-weight:600;">Colección Amarilla</a>
                    </div>
                </div>`;

                const sideMenu = document.getElementById('side-menu-fechas');
                document.getElementById('btn-abrir-fechas').onclick = () => sideMenu.style.left = '0';
                document.getElementById('btn-cerrar-fechas').onclick = () => sideMenu.style.left = '-350px';
            }
        });
    </script>
</body>
</html>
