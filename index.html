<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte & Detalles | Inicio</title>
    
    <link rel="stylesheet" href="global.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfbfb; overflow-x: hidden; color: #4a4a4a; }

        /* --- ANIMACIONES --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 90px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center;
            z-index: 2000; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); /* Toque dorado */
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .nav-container {
            width: 90%; max-width: 1200px; height: 100%;
            display: flex; align-items: center; justify-content: space-between; position: relative;
        }

        .nav-side { display: flex; gap: 30px; flex: 1; }
        .nav-left { justify-content: flex-end; padding-right: 80px; }
        .nav-right { justify-content: flex-start; padding-left: 80px; }

        .nav-side a { 
            text-decoration: none; 
            color: #5d4a4a; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1.5px;
            transition: 0.3s;
            position: relative;
        }

        .nav-side a::after {
            content: ''; width: 0; height: 1px; background: #d4af37;
            position: absolute; bottom: -5px; left: 0; transition: 0.3s;
        }

        .nav-side a:hover::after { width: 100%; }
        .nav-side a:hover { color: #d4af37; }

        .nav-logo {
            position: absolute; left: 50%; top: 50%; 
            transform: translate(-50%, -20%); 
            background: #ffffff; 
            width: 100px; height: 100px; 
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            z-index: 2100;
            border: 1px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .nav-logo img { width: 85%; height: 85%; object-fit: contain; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            background-color: #2c2c2c;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('img/OtroFondo.jpeg');
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            color: #fff;
        }

        .hero-content {
            z-index: 50;
            max-width: 800px;
            animation: fadeIn 1.2s ease-out;
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 400;
            letter-spacing: 6px;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hero-slogan {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin-bottom: 40px;
            color: #f3e5f5;
            opacity: 0.9;
        }
        
        .btn-hero {
            display: inline-block;
            padding: 18px 45px; 
            background: transparent;
            color: #ffffff;
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px; 
            transition: 0.4s;
            border: 1.5px solid #ffffff;
            backdrop-filter: blur(5px);
        }
        
        .btn-hero:hover {
            background: #ffffff;
            color: #333;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-side { display: none; }
            .nav-logo { width: 85px; height: 85px; transform: translate(-50%, -10%); }
            .navbar { height: 70px; }
            .hero { background-position: center; }
        }

        @media (max-width: 480px) {
            .hero h1 { letter-spacing: 2px; }
            .hero-slogan { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="navbar-universal"></div>

    <header class="hero">
        <div class="hero-content">
            <h1>Arte & Detalles</h1>
            <p class="hero-slogan">Regalos que duran para siempre</p>
            <a href="catalogo.html" class="btn-hero">Descubrir Colección</a>
        </div>
    </header>

    <div id="whatsapp-universal" data-msj="¡Hola! Estoy en tu página de Inicio y me gustaría hacer una consulta."></div>

    <script src="componentes.js"></script>

</body>
</html>
